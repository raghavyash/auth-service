server:
  port: 8095


spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Public Endpoint: Auth service login
        - id: auth-service
          uri: http://localhost:8095
          predicates:
            - Path=/auth/**

        # Protected Endpoint: User management service
        - id: student-service
          uri: http://localhost:8092
          predicates:
            - Path=/v1/student/**

        - id: feeaccount-service
          uri: http://localhost:8094
          predicates:
            - Path=/v1/fee/**

        - id: notification-service
          uri: http://localhost:8093
          predicates:
            - Path=/v1/notification/**

  # Resource Server configuration to map the token decoding key
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/oauth2/jwks

